<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声音时空胶囊</title>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.0/dist/browser-image-compression.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .upload-area { margin: 15px 0; padding: 15px; border: 2px solid #3498db; border-radius: 8px; text-align: center; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #record-btn { background: #e74c3c; color: white; }
        #stop-btn { background: #3498db; color: white; }
        .delete-btn { background: #95a5a6; color: white; font-size: 0.8em; padding: 5px; margin-top: 5px; }
        ul { list-style: none; margin-top: 20px; }
        li { padding: 15px; border: 1px solid #eee; margin-bottom: 10px; border-radius: 8px; position: relative; }
        .unlocked { border: 2px solid #2ecc71; background: #e8f8f5; }
        img { width: 100%; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>声音时空胶囊</h1>
        <p id="status">正在获取定位与麦克风...</p>
        <input type="text" id="title" placeholder="胶囊名称" style="width:100%; padding:10px; margin:10px 0;">
        <div class="upload-area">
            <label>🖼️ 上传照片：</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <button id="record-btn">🎤 开始录音</button>
        <button id="stop-btn" disabled>💾 封存并埋藏</button>
        <ul id="list"></ul>
    </div>

    <script>
        let mediaRecorder, audioChunks = [], stream;

        // 1. 初始化时就请求麦克风，确保权限可用
        async function init() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('status').innerText = "定位与麦克风已就绪";
            } catch (err) {
                document.getElementById('status').innerText = "❌ 麦克风权限被拒绝，请刷新页面开启";
            }
        }
        init();

        navigator.geolocation.watchPosition(pos => {
            document.getElementById('status').innerText = `定位: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        });

        document.getElementById('record-btn').onclick = () => {
            if (!stream) return alert("麦克风未就绪，请刷新重试");
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.start();
            document.getElementById('record-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
            document.getElementById('status').innerText = "🔴 正在录音...";
        };

        document.getElementById('stop-btn').onclick = () => {
            mediaRecorder.stop();
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = async () => {
                    let imageBase64 = null;
                    const file = document.getElementById('imageInput').files[0];
                    if (file) {
                        const compressed = await imageCompression(file, { maxSizeMB: 0.2, maxWidthOrHeight: 800 });
                        imageBase64 = await imageCompression.getDataUrlFromFile(compressed);
                    }
                    const capsules = JSON.parse(localStorage.getItem('capsules') || '[]');
                    capsules.push({ id: Date.now(), title: document.getElementById('title').value || '无名胶囊', audio: reader.result, image: imageBase64 });
                    localStorage.setItem('capsules', JSON.stringify(capsules));
                    document.getElementById('record-btn').disabled = false;
                    document.getElementById('stop-btn').disabled = true;
                    document.getElementById('status').innerText = "✅ 胶囊已封存";
                    render();
                };
            };
        };

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            JSON.parse(localStorage.getItem('capsules') || '[]').forEach(c => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${c.title}</strong><br><audio src="${c.audio}" controls></audio>${c.image ? `<img src="${c.image}">` : ''}<br><button class="delete-btn" onclick="deleteCapsule(${c.id})">🗑️ 删除</button>`;
                list.appendChild(li);
            });
        }
        render();
    </script>
</body>
</html>
