<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声音时空胶囊</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>声音时空胶囊</h1>
            <p id="location-status">正在获取当前世界坐标...</p>
        </header>

        <section class="record-section">
            <h2>埋藏新胶囊</h2>
            <input type="text" id="capsule-title" placeholder="例如：夏夜散步的碎碎念...">
            <div class="controls">
                <button id="record-btn">🎤 开始录音</button>
                <button id="stop-btn" disabled>💾 封存并埋藏</button>
            </div>
            <p id="record-status"></p>
        </section>

        <section class="capsules-section">
            <h2>附近的胶囊 (15米内解锁)</h2>
            <ul id="capsules-list">
                </ul>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
