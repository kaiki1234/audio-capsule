<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声音时空胶囊</title>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.0/dist/browser-image-compression.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        header { text-align: center; margin-bottom: 20px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        #record-btn { background: #e74c3c; color: white; }
        #stop-btn { background: #3498db; color: white; }
        ul { list-style: none; }
        li { padding: 15px; border: 1px solid #eee; margin-bottom: 10px; border-radius: 8px; }
        .unlocked { border-color: #2ecc71; background: #e8f8f5; }
        img { width: 100%; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>声音时空胶囊</h1><p id="status">正在定位...</p></header>
        <input type="text" id="title" placeholder="胶囊名称">
        <input type="file" id="imageInput" accept="image/*">
        <button id="record-btn">🎤 开始录音</button>
        <button id="stop-btn" disabled>💾 封存并埋藏</button>
        <ul id="list"></ul>
    </div>

    <script>
        let currentLat, currentLon, mediaRecorder, audioChunks = [];
        const statusEl = document.getElementById('status');

        navigator.geolocation.watchPosition(pos => {
            currentLat = pos.coords.latitude;
            currentLon = pos.coords.longitude;
            statusEl.innerText = `坐标: ${currentLat.toFixed(4)}, ${currentLon.toFixed(4)}`;
            render();
        });

        document.getElementById('record-btn').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.start();
            document.getElementById('record-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
        };

        document.getElementById('stop-btn').onclick = async () => {
            mediaRecorder.stop();
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks);
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = async () => {
                    let imageBase64 = null;
                    const file = document.getElementById('imageInput').files[0];
                    if (file) {
                        const compressed = await imageCompression(file, { maxSizeMB: 0.2, maxWidthOrHeight: 800 });
                        imageBase64 = await imageCompression.getDataUrlFromFile(compressed);
                    }
                    const capsules = JSON.parse(localStorage.getItem('capsules') || '[]');
                    capsules.push({ title: document.getElementById('title').value, lat: currentLat, lon: currentLon, audio: reader.result, image: imageBase64, time: new Date().toLocaleString() });
                    localStorage.setItem('capsules', JSON.stringify(capsules));
                    render();
                    document.getElementById('record-btn').disabled = false;
                    document.getElementById('stop-btn').disabled = true;
                };
            };
        };

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            JSON.parse(localStorage.getItem('capsules') || '[]').forEach(c => {
                const dist = Math.sqrt((c.lat-currentLat)**2 + (c.lon-currentLon)**2) * 111000;
                const li = document.createElement('li');
                li.className = dist < 15 ? 'unlocked' : '';
                li.innerHTML = `<strong>${c.title}</strong><br>${dist < 15 ? `<audio src="${c.audio}" controls></audio>${c.image ? `<img src="${c.image}">` : ''}` : '🔒 距离太远'}`;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
